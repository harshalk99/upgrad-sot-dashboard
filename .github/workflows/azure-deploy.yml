# Deploy the UGSOT dashboard to Azure App Service (Linux, Node 22).
#
# Trigger: push to main, or manual dispatch.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Secrets):
#   AZURE_WEBAPP_PUBLISH_PROFILE   — full <publishData> XML from Azure portal.
#
# Required GitHub repo variables (Settings → Secrets and variables → Variables):
#   AZURE_WEBAPP_NAME              — e.g. "upgrad-sotm-dashboard"
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   NEXT_PUBLIC_SENTRY_DSN         — optional
#
# All server-only secrets (SUPABASE_SERVICE_ROLE_KEY, ELEVENLABS_API_KEY,
# AZURE_OPENAI_*, N8N_WEBHOOK_SECRET) are set as App Service Configuration —
# NOT in this workflow. See DEPLOYMENT.md.

name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Build (Next.js standalone output)
        env:
          # NEXT_PUBLIC_* are inlined at build time. Server-only secrets are
          # injected by App Service at runtime — do NOT add them here.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          # Next.js standalone output writes a minimal server.js + tracing-only
          # node_modules into .next/standalone. Static assets and /public are
          # NOT copied automatically — we have to layer them in.
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -R public .next/standalone/public; fi
          # Surface a tiny package.json so App Service's auto-detection picks
          # Node and runs `npm start` → `node server.js`.
          cat > .next/standalone/package.json <<'JSON'
          {
            "name": "ugsot-dashboard-standalone",
            "private": true,
            "scripts": { "start": "node server.js" },
            "engines": { "node": ">=22.0.0" }
          }
          JSON

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .next/standalone
